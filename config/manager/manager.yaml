---
apiVersion: v1
kind: Namespace
metadata:
  name: code-hub-operator-system
  labels:
    app.kubernetes.io/name: code-hub-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-hub-operator-controller-manager
  namespace: code-hub-operator-system
  labels:
    app.kubernetes.io/name: code-hub-operator
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: code-hub-operator
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-hub-operator
        control-plane: controller-manager
    spec:
      serviceAccountName: code-hub-operator-controller-manager
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: ghcr.io/cagojeiger/code-hub-operator:dev
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
          env:
            - name: REDIS_ADDR
              value: "redis.code-hub-operator-system.svc:6379"
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

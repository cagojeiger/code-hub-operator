---
# Minimal CodeHubWorkspace that inherits image / ports / idle / resources
# from the 'standard' CodeHubWorkspaceClass. Only instance-level fields
# (replica policy, last-used key, env) live here. Apply the Class from
# codehub_v1alpha1_codehubworkspaceclass.yaml first.
apiVersion: codehub.project-jelly.io/v1alpha1
kind: CodeHubWorkspace
metadata:
  name: demo-workspace
  namespace: demo
spec:
  classRef: standard
  minReplicas: 0
  maxReplicas: 1
  lastUsedKey: "workspace:demo:demo-workspace:last_used_at"
  env:
    APP_MODE: workspace

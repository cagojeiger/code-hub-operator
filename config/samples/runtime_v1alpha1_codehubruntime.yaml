---
apiVersion: runtime.project-jelly.io/v1alpha1
kind: CodeHubRuntime
metadata:
  name: demo-runtime
  namespace: demo
spec:
  image: ghcr.io/acme/runtime-demo:0.1.0
  imagePullPolicy: IfNotPresent
  servicePort: 80
  containerPort: 8080
  idleTimeoutSeconds: 1800
  minReplicas: 0
  maxReplicas: 1
  lastUsedKey: "runtime:demo:demo-runtime:last_used_at"
  env:
    APP_MODE: runtime
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

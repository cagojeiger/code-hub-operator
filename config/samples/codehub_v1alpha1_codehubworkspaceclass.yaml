---
# CodeHubWorkspaceClass is cluster-scoped — platform admins curate these and
# users reference them from a CodeHubWorkspace via spec.classRef.
apiVersion: codehub.project-jelly.io/v1alpha1
kind: CodeHubWorkspaceClass
metadata:
  name: standard
spec:
  image: ghcr.io/acme/runtime-demo:0.1.0
  imagePullPolicy: IfNotPresent
  servicePort: 80
  containerPort: 8080
  idleTimeoutSeconds: 1800
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Tier 0 ─────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go fmt
        run: |
          out=$(gofmt -l .)
          if [[ -n "$out" ]]; then
            echo "::error::gofmt diff detected:"
            echo "$out"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1

  # ── Tier 1 ─────────────────────────────────────────────────────────────────
  unit:
    name: unit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
      - name: go test (unit, race, no tags)
        run: go test ./... -race -count=1

  # ── Tier 2 ─────────────────────────────────────────────────────────────────
  envtest:
    name: envtest
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
      - name: Fetch envtest binaries
        id: envtest
        run: |
          path=$(setup-envtest use 1.30.0 -p path)
          echo "KUBEBUILDER_ASSETS=${path}" >> "$GITHUB_ENV"
          echo "envtest assets at: ${path}"
      - name: go test -tags=envtest
        run: go test -tags=envtest ./internal/controller/... -race -count=1 -v

  # ── Tier 3 ─────────────────────────────────────────────────────────────────
  e2e-kind:
    name: e2e-kind
    runs-on: ubuntu-latest
    needs: envtest
    # Only run on main push, manual dispatch, or PRs with the `e2e` label.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: codehub-dev
          wait: 60s
      - name: Build operator image
        run: docker build -t code-hub-operator:e2e .
      - name: Load image into kind
        run: kind load docker-image code-hub-operator:e2e --name codehub-dev
      - name: Run full scale cycle
        env:
          IMG: code-hub-operator:e2e
          KIND_CLUSTER: codehub-dev
          KUBE_CONTEXT: kind-codehub-dev
        run: bash test/e2e/cycle.sh
      - name: Dump operator logs on failure
        if: failure()
        run: |
          kubectl --context=kind-codehub-dev -n code-hub-operator-system logs deploy/code-hub-operator-controller-manager --tail=200 || true
          kubectl --context=kind-codehub-dev -n e2e-demo get events --sort-by=.lastTimestamp || true
